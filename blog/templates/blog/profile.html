{% extends 'blog/base.html' %}
{% block content %}
<div style="max-width:560px; margin:0 auto;">
    <p style="font-family:'DM Mono',monospace; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:0.5rem;">Account</p>
    <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900; margin-bottom:2rem;">Your Profile</h1>

    <div style="background:white; border:1.5px solid var(--border); padding:2rem; margin-bottom:2rem;">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border);">
            <div style="width:56px; height:56px; border-radius:50%; background:var(--ink); display:flex; align-items:center; justify-content:center;">
                <span style="color:var(--paper); font-size:1.4rem; font-weight:700;">{{ user.username|first|upper }}</span>
            </div>
            <div>
                <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem; margin:0;">{{ user.username }}</h2>
                <p style="font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--muted); margin:0;">Member</p>
            </div>
        </div>

        <form method="POST" style="display:flex; flex-direction:column; gap:1.25rem;">
            {% csrf_token %}
            <div>
                <label>Email Address</label>
                <input type="email" name="email" value="{{ user.email }}" placeholder="your@email.com">
            </div>
            <button type="submit" class="btn btn-primary" style="align-self:flex-start;">Update Profile</button>
        </form>
    </div>

    {% if messages %}
        {% for message in messages %}
            <p style="color:#28a745; font-size:0.88rem; padding:0.75rem; background:#d4edda; border-left:3px solid #28a745;">✓ {{ message }}</p>
        {% endfor %}
    {% endif %}
</div>
{% endblock %}
