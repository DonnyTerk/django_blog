<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django Blog</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/styles.css' %}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="{% url 'post-list' %}">Django Blog</a>
    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">Hi, {{ user.username }}</span>
            <a class="btn btn-light btn-sm me-2" href="{% url 'profile' %}">Profile</a>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'post-create' %}">New Post</a>
            <a class="btn btn-light btn-sm" href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a class="btn btn-light btn-sm me-2" href="{% url 'login' %}">Login</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
  </div>
</nav>
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
