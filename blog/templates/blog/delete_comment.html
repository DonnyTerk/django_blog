{% extends 'blog/base.html' %}
{% block content %}
<div style="max-width:500px; margin:3rem auto; text-align:center;">
    <p style="font-size:3rem; margin-bottom:1rem;">🗑️</p>
    <h1 style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; margin-bottom:1rem;">Delete Comment?</h1>
    <p style="color:var(--muted); margin-bottom:1rem;">This comment will be permanently removed:</p>
    <blockquote style="background:var(--cream); border-left:3px solid var(--accent); padding:1rem 1.5rem; text-align:left; margin-bottom:2rem; font-style:italic; color:#3a3a3a;">
        {{ comment.content|truncatewords:30 }}
    </blockquote>

    <form method="POST" style="display:flex; gap:1rem; justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete It</button>
        <a href="{% url 'post-detail' comment.post.id %}" class="btn btn-ghost">Cancel</a>
    </form>
</div>
{% endblock %}
